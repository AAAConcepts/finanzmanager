<!DOCTYPE html>
<html lang="de">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="FinanzManager"><title>FinanzManager</title><style>*{margin:0;padding:0;box-sizing:border-box}html,body,#app{width:100%;height:100%}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f7fa;color:#0f172a;font-size:16px}input,select,textarea,button{font-family:inherit;font-size:16px;-webkit-tap-highlight-color:transparent}input[type=number]{-moz-appearance:textfield}input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}.app{min-height:100vh;padding-bottom:100px}.header{background:#fff;border-bottom:1px solid #e8edf3;position:sticky;top:0;z-index:40;box-shadow:0 1px 6px rgba(0,0,0,.05)}.hdr{max-width:600px;margin:0 auto;padding:0 16px;display:flex;justify-content:space-between;align-items:center;height:56px}.logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#2563eb);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px}.htxt{flex:1;margin-left:10px}.ht{font-weight:800;font-size:15px;line-height:1}.hs{font-size:10px;color:#64748b;margin-top:1px}.hbtn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:10px;border:1px solid #e8edf3;background:#f8fafc;cursor:pointer;font-size:17px}.content{max-width:600px;margin:0 auto;padding:16px}.card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:12px}.card-title{font-weight:700;font-size:14px;margin-bottom:10px}.empty{text-align:center;padding:60px 20px;color:#64748b}.empty-icon{font-size:56px;margin-bottom:14px}.empty-text{font-weight:700;font-size:17px;color:#0f172a;margin-bottom:6px}.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8edf3;z-index:40;box-shadow:0 -2px 12px rgba(0,0,0,.06)}.nav-in{max-width:600px;margin:0 auto;display:flex}.nav-item{flex:1;background:0;border:0;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;cursor:pointer;color:#64748b;border-top:2px solid transparent}.nav-item.active{color:#7c3aed;border-top-color:#7c3aed}.nav-icon{font-size:18px;line-height:1}.nav-label{font-size:10px;font-weight:500}.nav-item.active .nav-label{font-weight:700}.fab{position:fixed;bottom:76px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#2563eb);border:0;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(99,66,237,.45);display:flex;align-items:center;justify-content:center;z-index:50}.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);display:flex;align-items:flex-end;z-index:200}.modal{background:#fff;border-radius:22px 22px 0 0;width:100%;padding:0 0 40px;max-height:95vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.15)}.modal-drag{display:flex;justify-content:center;padding-top:12px;margin-bottom:4px}.modal-handle{width:40px;height:4px;border-radius:99px;background:#e2e8f0}.modal-hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 20px 16px}.modal-hdr h2{margin:0;font-weight:800;font-size:20px}.modal-close{background:#f1f5f9;border:0;border-radius:50%;width:38px;height:38px;color:#64748b;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}.modal-content{padding:0 20px;display:flex;flex-direction:column;gap:16px}.form-group{display:flex;flex-direction:column}.form-label{font-size:11px;color:#64748b;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}.inp,.sel{background:#f8fafc;border:1.5px solid #e8edf3;border-radius:12px;padding:13px 14px;color:#0f172a;font-size:16px;outline:0;font-family:inherit;width:100%}.sel{cursor:pointer}.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:24px 20px 0}.btn-cancel{background:#f1f5f9;border:1px solid #e8edf3;border-radius:14px;padding:15px;color:#64748b;cursor:pointer;font-family:inherit;font-weight:700;font-size:16px}.btn-save{background:#7c3aed;border:0;border-radius:14px;padding:15px;color:#fff;cursor:pointer;font-family:inherit;font-weight:700;font-size:16px;box-shadow:0 4px 14px rgba(124,58,237,.35)}.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#16a34a;color:#fff;border-radius:14px;padding:13px 20px;font-weight:600;font-size:14px;box-shadow:0 6px 24px rgba(0,0,0,.2);z-index:300;display:flex;align-items:center;gap:10px;max-width:88vw}.item-card{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:0 2px 12px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center;border-left:3px solid}.item-left{flex:1;min-width:0}.item-name{font-weight:600;font-size:14px}.item-type{font-size:11px;color:#64748b;margin-top:2px}.item-amt{font-weight:700;font-size:15px;white-space:nowrap;margin-left:12px}.item-btns{display:flex;gap:8px;margin-top:8px}.item-btn{flex:1;background:#f8fafc;border:1px solid #e8edf3;border-radius:10px;padding:9px;color:#0f172a;cursor:pointer;font-family:inherit;font-weight:600;font-size:13px}.item-btn-del{background:#fff1f2;border-color:#fecdd3;color:#dc2626;padding:9px 13px;flex:0}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.chip{background:#f8fafc;border:1px solid #e8edf3;border-radius:10px;padding:8px 12px}.chip-lbl{font-size:10px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}.chip-val{font-weight:700;font-size:14px}</style></head><body><div id="app"></div><script>const SK="finanzapp_v5";const fmt=v=>new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR"}).format(v||0);const fmtD=d=>d?new Date(d).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"}):"–";const ddiff=iso=>iso?Math.ceil((new Date(iso)-new Date())/86400000):null;const dlabel=diff=>{if(diff===null)return null;if(diff<0)return{text:Math.abs(diff)+"d überfällig",bg:"#fee2e2",col:"#dc2626"};if(diff===0)return{text:"Heute!",bg:"#fee2e2",col:"#dc2626"};if(diff===1)return{text:"Morgen",bg:"#fef3c7",col:"#d97706"};if(diff<=7)return{text:"in "+diff+"d",bg:"#fef9c3",col:"#b45309"};if(diff<=30)return{text:"in "+diff+"d",bg:"#f0fdf4",col:"#16a34a"};return{text:"in "+diff+"d",bg:"#f8fafc",col:"#9ca3af"}};const C={bg:"#f5f7fa",card:"#fff",border:"#e8edf3",text:"#0f172a",sub:"#64748b",gl:"#7c3aed",kr:"#2563eb",vs:"#059669",ps:"#db2777",danger:"#dc2626"};const FARBEN=["#7c3aed","#2563eb","#059669","#db2777","#ea580c","#0891b2","#d97706","#dc2626","#64748b","#0d9488"];const GL_TYP=["Privatperson","Unternehmen","Bank","Finanzamt","Vermieter","Arbeitgeber","Sonstige"];const KR_TYP=["Ratenkredit","Autokredit","Immobilienkredit","Dispositionskredit","Privatdarlehen","Sonstige"];const VS_TYP=["Haftpflicht","KFZ","Hausrat","Lebensversicherung","Kranken","Zahnzusatz","Berufsunfähigkeit","Rechtsschutz","Unfall","Sonstige"];const PS_BEZ=["Familie","Freund/in","Bekannte/r","Kollege/in","Sonstige"];class FM{constructor(){this.tab="home";this.data={glaeubiger:[],kredite:[],versicherungen:[],privatSchulden:[],fixkosten:[],nextId:1};this.modal=null;this.toast=null;this.loadData();this.render()}loadData(){const r=localStorage.getItem(SK);if(r)try{this.data=JSON.parse(r);if(!this.data.privatSchulden)this.data.privatSchulden=[];if(!this.data.fixkosten)this.data.fixkosten=[]}catch(e){}}saveData(){localStorage.setItem(SK,JSON.stringify(this.data))}showToast(m){this.toast=m;this.render();setTimeout(()=>{this.toast=null;this.render()},3000)}save(k,i){i.betrag=parseFloat(i.betrag)||0;i.gezahlt=parseFloat(i.gezahlt)||0;i.rate=parseFloat(i.rate)||0;if(i.id){this.data[k]=this.data[k].map(x=>x.id===i.id?i:x)}else{i.id=this.data.nextId++;this.data[k].push(i)}this.saveData();this.modal=null;this.showToast("Gespeichert ✓");this.render()}del(k,id){this.data[k]=this.data[k].filter(x=>x.id!==id);this.saveData();this.showToast("Gelöscht");this.render()}renderHome(){const tGL=this.data.glaeubiger.reduce((s,g)=>s+Math.max(0,g.betrag-g.gezahlt),0);const tPS=(this.data.privatSchulden||[]).reduce((s,p)=>s+Math.max(0,p.betrag-p.gezahlt),0);const tKR=this.data.kredite.reduce((s,k)=>s+(k.restschuld||0),0);return`<div class="card"><div class="card-title">👤 Gläubiger offen</div><div style="font-size:28px;font-weight:800;color:#7c3aed">${fmt(tGL)}</div></div><div class="card"><div class="card-title">🤝 Private Schulden</div><div style="font-size:28px;font-weight:800;color:#db2777">${fmt(tPS)}</div></div><div class="card"><div class="card-title">🏦 Kreditrestschuld</div><div style="font-size:28px;font-weight:800;color:#2563eb">${fmt(tKR)}</div></div><div class="card"><div class="card-title">📋 Einträge</div><div style="font-size:14px;line-height:1.8"><div>👤 Gläubiger: ${this.data.glaeubiger.length}</div><div>🤝 Privat: ${this.data.privatSchulden.length}</div><div>🏦 Kredite: ${this.data.kredite.length}</div><div>🛡️ Versicherungen: ${this.data.versicherungen.length}</div><div>📋 Fixkosten: ${this.data.fixkosten.length}</div></div></div>`}renderGL(){if(this.data.glaeubiger.length===0)return`<div class="empty"><div class="empty-icon">👤</div><div class="empty-text">Noch keine Gläubiger</div></div>`;return this.data.glaeubiger.map(g=>{const r=Math.max(0,g.betrag-g.gezahlt);return`<div class="card" style="border-left:4px solid ${g.farbe}"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><div><div style="font-weight:700;font-size:16px">${g.name}</div><div style="font-size:12px;color:#64748b;margin-top:2px">${g.typ}</div></div><div style="text-align:right"><div style="font-weight:800;font-size:18px;color:#7c3aed">${fmt(r)}</div><div style="font-size:10px;color:#64748b">offen</div></div></div>${g.email?`<div style="font-size:12px;color:#64748b;margin-bottom:10px">✉️ ${g.email}</div>`:""}${g.telefon?`<div style="font-size:12px;color:#64748b;margin-bottom:10px">📱 ${g.telefon}</div>`:""}${g.notiz?`<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:9px 12px;font-size:13px;color:#92400e;margin-bottom:10px">📝 ${g.notiz}</div>`:""}${g.iban?`<div style="background:#f8fafc;border-radius:10px;padding:8px 12px;font-size:12px;color:#64748b;margin-bottom:10px;font-family:monospace">IBAN: <strong style="color:#0f172a">${g.iban}</strong></div>`:""}${g.betrag?`<div style="background:#f1f5f9;border-radius:99px;height:6px;overflow:hidden;margin-bottom:10px"><div style="width:${Math.min(100,((g.gezahlt||0)/g.betrag)*100)}%;height:100%;background:${g.farbe};border-radius:99px"></div></div>`:""}<div style="display:flex;gap:8px"><button class="item-btn" onclick="app.editGL(${g.id})">✏️ Bearbeiten</button><button class="item-btn-del" onclick="app.del('glaeubiger',${g.id})">🗑</button></div></div>`}).join("")}renderKR(){if(this.data.kredite.length===0)return`<div class="empty"><div class="empty-icon">🏦</div><div class="empty-text">Noch keine Kredite</div></div>`;return this.data.kredite.map(k=>`<div class="card" style="border-left:4px solid ${k.farbe}"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><div><div style="font-weight:700;font-size:16px">${k.name||k.bank||"Kredit"}</div><div style="font-size:12px;color:#64748b;margin-top:2px">${k.typ}</div></div><div style="text-align:right"><div style="font-weight:800;font-size:18px;color:#2563eb">${fmt(k.restschuld)}</div><div style="font-size:10px;color:#64748b">Restschuld</div></div></div>${k.rate?`<div style="font-size:12px;margin-bottom:10px"><strong>Rate:</strong> ${fmt(k.rate)}/Mo</div>`:""}${k.zinssatz?`<div style="font-size:12px;margin-bottom:10px">Zinssatz: ${k.zinssatz}%</div>`:""}${k.notiz?`<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:9px 12px;font-size:13px;color:#92400e;margin-bottom:10px">📝 ${k.notiz}</div>`:""}${k.iban?`<div style="background:#f8fafc;border-radius:10px;padding:8px 12px;font-size:12px;color:#64748b;margin-bottom:10px;font-family:monospace">IBAN: <strong style="color:#0f172a">${k.iban}</strong></div>`:""}<div style="display:flex;gap:8px"><button class="item-btn" onclick="app.editKR(${k.id})">✏️ Bearbeiten</button><button class="item-btn-del" onclick="app.del('kredite',${k.id})">🗑</button></div></div>`).join("")}renderPS(){if((this.data.privatSchulden||[]).length===0)return`<div class="empty"><div class="empty-icon">🤝</div><div class="empty-text">Noch keine privaten Schulden</div></div>`;return(this.data.privatSchulden||[]).map(p=>{const r=Math.max(0,p.betrag-p.gezahlt);return`<div class="card" style="border-left:4px solid ${p.farbe}"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><div><div style="font-weight:700;font-size:16px">${p.person}</div><div style="font-size:12px;color:#64748b;margin-top:2px">${p.beziehung}</div></div><div style="text-align:right"><div style="font-weight:800;font-size:18px;color:#db2777">${fmt(r)}</div><div style="font-size:10px;color:#64748b">offen</div></div></div>${r<0.01?'<div style="background:#dcfce7;color:#16a34a;border-radius:6px;padding:3px 9px;font-size:10px;font-weight:700;display:inline-block;margin-bottom:10px">✓ FERTIG</div>':""}${p.grund?`<div style="font-size:12px;color:#64748b;margin-bottom:8px">💬 ${p.grund}</div>`:""}${p.notiz?`<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:9px 12px;font-size:13px;color:#92400e;margin-bottom:10px">📝 ${p.notiz}</div>`:""}${p.betrag?`<div style="background:#f1f5f9;border-radius:99px;height:6px;overflow:hidden;margin-bottom:10px"><div style="width:${Math.min(100,((p.gezahlt||0)/p.betrag)*100)}%;height:100%;background:${p.farbe};border-radius:99px"></div></div>`:""}<div style="display:flex;gap:8px"><button class="item-btn" onclick="app.editPS(${p.id})">✏️ Bearbeiten</button><button class="item-btn-del" onclick="app.del('privatSchulden',${p.id})">🗑</button></div></div>`}).join("")}renderVS(){if(this.data.versicherungen.length===0)return`<div class="empty"><div class="empty-icon">🛡</div><div class="empty-text">Noch keine Versicherungen</div></div>`;return this.data.versicherungen.map(v=>`<div class="card" style="border-left:4px solid ${v.farbe}"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><div><div style="font-weight:700;font-size:16px">${v.name}</div><div style="font-size:12px;color:#64748b;margin-top:2px">${v.typ}</div></div><div style="text-align:right"><div style="font-weight:800;font-size:18px;color:#059669">${fmt(v.beitrag)}</div><div style="font-size:10px;color:#64748b">${v.zahlweise}</div></div></div>${v.anbieter?`<div style="font-size:12px;margin-bottom:8px">Anbieter: <strong>${v.anbieter}</strong></div>`:""}${v.kuendigungFrist?`<div style="font-size:12px;margin-bottom:8px">⏱ Kündigung: ${v.kuendigungFrist}</div>`:""}${v.notiz?`<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:9px 12px;font-size:13px;color:#92400e;margin-bottom:10px">📝 ${v.notiz}</div>`:""}${v.vertragsnr?`<div style="background:#f8fafc;border-radius:10px;padding:8px 12px;font-size:12px;color:#64748b;margin-bottom:10px">Vertragsnr: <strong>${v.vertragsnr}</strong></div>`:""}<div style="display:flex;gap:8px"><button class="item-btn" onclick="app.editVS(${v.id})">✏️ Bearbeiten</button><button class="item-btn-del" onclick="app.del('versicherungen',${v.id})">🗑</button></div></div>`).join("")}renderFK(){if((this.data.fixkosten||[]).length===0)return`<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Noch keine Fixkosten</div></div>`;return(this.data.fixkosten||[]).map(f=>{const mo=(f.zahlweise==="monatlich"?f.betrag:f.zahlweise==="vierteljährlich"?f.betrag/3:f.zahlweise==="halbjährlich"?f.betrag/6:f.betrag/12);return`<
