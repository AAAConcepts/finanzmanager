<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><title>FinanzManager</title><style>*{margin:0;padding:0;box-sizing:border-box}html,body,#app{width:100%;height:100%}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f7fa;color:#0f172a;font-size:16px}input,select,textarea,button{font-family:inherit;font-size:16px;-webkit-tap-highlight-color:transparent}input[type=number]{-moz-appearance:textfield}input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}.app{min-height:100vh;padding-bottom:100px}.header{background:#fff;border-bottom:1px solid #e8edf3;position:sticky;top:0;z-index:40;box-shadow:0 1px 6px rgba(0,0,0,.05)}.hdr{max-width:600px;margin:0 auto;padding:0 16px;display:flex;justify-content:space-between;align-items:center;height:56px}.logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#2563eb);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800}.htxt{flex:1;margin-left:10px}.ht{font-weight:800;font-size:15px}.hs{font-size:10px;color:#64748b;margin-top:1px}.hbtn{width:38px;height:38px;border-radius:10px;border:1px solid #e8edf3;background:#f8fafc;cursor:pointer;font-size:17px}.content{max-width:600px;margin:0 auto;padding:16px}.card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:12px}.empty{text-align:center;padding:60px 20px;color:#64748b}.empty-icon{font-size:56px;margin-bottom:14px}.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8edf3;z-index:40;box-shadow:0 -2px 12px rgba(0,0,0,.06)}.nav-in{max-width:600px;margin:0 auto;display:flex}.nav-item{flex:1;background:0;border:0;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;cursor:pointer;color:#64748b;border-top:2px solid transparent;font-size:10px}.nav-item.active{color:#7c3aed;border-top-color:#7c3aed}.nav-label{font-weight:500}.nav-item.active .nav-label{font-weight:700}.fab{position:fixed;bottom:76px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#2563eb);border:0;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(99,66,237,.45);z-index:50}.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);display:flex;align-items:flex-end;z-index:200}.modal{background:#fff;border-radius:22px 22px 0 0;width:100%;padding:0 0 40px;max-height:95vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.15)}.modal-drag{display:flex;justify-content:center;padding-top:12px;margin-bottom:4px}.modal-handle{width:40px;height:4px;border-radius:99px;background:#e2e8f0}.modal-hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 20px 16px}.modal-hdr h2{margin:0;font-weight:800;font-size:20px}.modal-close{background:#f1f5f9;border:0;border-radius:50%;width:38px;height:38px;color:#64748b;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}.modal-content{padding:0 20px;display:flex;flex-direction:column;gap:16px}.form-group{display:flex;flex-direction:column}.form-label{font-size:11px;color:#64748b;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}.inp,.sel{background:#f8fafc;border:1.5px solid #e8edf3;border-radius:12px;padding:13px 14px;color:#0f172a;font-size:16px;outline:0;width:100%}.sel{cursor:pointer}.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:24px 20px 0}.btn{border-radius:14px;padding:15px;font-family:inherit;font-weight:700;font-size:16px;cursor:pointer;border:0}.btn-cancel{background:#f1f5f9;border:1px solid #e8edf3;color:#64748b}.btn-save{background:#7c3aed;color:#fff;box-shadow:0 4px 14px rgba(124,58,237,.35)}.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#16a34a;color:#fff;border-radius:14px;padding:13px 20px;font-weight:600;font-size:14px;box-shadow:0 6px 24px rgba(0,0,0,.2);z-index:300}.item-card{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:0 2px 12px rgba(0,0,0,.08);border-left:3px solid}.item-left{flex:1;min-width:0}.item-name{font-weight:600;font-size:14px}.item-type{font-size:11px;color:#64748b;margin-top:2px}.item-btns{display:flex;gap:8px;margin-top:8px}.item-btn{flex:1;background:#f8fafc;border:1px solid #e8edf3;border-radius:10px;padding:9px;color:#0f172a;cursor:pointer;font-family:inherit;font-weight:600;font-size:13px}.item-btn-del{background:#fff1f2;border-color:#fecdd3;color:#dc2626;padding:9px 13px;flex:0}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.raten-day{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.08)}.raten-day-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.raten-day-num{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#2563eb);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px}.raten-day-txt{flex:1;margin-left:10px}.raten-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #e8edf3;font-size:13px}.raten-item:last-child{border-bottom:0}.raten-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}.raten-name{flex:1;font-weight:600}.raten-val{font-weight:700;white-space:nowrap}</style></head><body><div id="app"></div><script>const SK="finanzapp_v5";const fmt=v=>new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR"}).format(v||0);const fmtD=d=>d?new Date(d).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"}):"–";const fmtDL=d=>d?new Date(d).toLocaleDateString("de-DE",{day:"2-digit",month:"long",year:"numeric"}):"–";const ddiff=iso=>iso?Math.ceil((new Date(iso)-new Date())/86400000):null;const dlabel=diff=>{if(diff===null)return null;if(diff<0)return{text:Math.abs(diff)+"d überfällig",bg:"#fee2e2",col:"#dc2626"};if(diff===0)return{text:"Heute!",bg:"#fee2e2",col:"#dc2626"};if(diff===1)return{text:"Morgen",bg:"#fef3c7",col:"#d97706"};if(diff<=7)return{text:"in "+diff+"d",bg:"#fef9c3",col:"#b45309"};if(diff<=30)return{text:"in "+diff+"d",bg:"#f0fdf4",col:"#16a34a"};return{text:"in "+diff+"d",bg:"#f8fafc",col:"#9ca3af"}};const GL_TYP=["Privatperson","Unternehmen","Bank"];const KR_TYP=["Ratenkredit","Autokredit","Immobilie"];const VS_TYP=["Haftpflicht","KFZ","Hausrat","Lebensversicherung","Kranken"];const PS_BEZ=["Familie","Freund/in","Bekannte/r","Kollege/in"];class FM{constructor(){this.tab="home";this.data={glaeubiger:[],kredite:[],versicherungen:[],privatSchulden:[],fixkosten:[],nextId:1};this.modal=null;this.toast=null;this.editIdField=null;this.loadData();this.render()}loadData(){const r=localStorage.getItem(SK);if(r)try{this.data=JSON.parse(r);if(!this.data.privatSchulden)this.data.privatSchulden=[];if(!this.data.fixkosten)this.data.fixkosten=[]}catch(e){}}saveData(){localStorage.setItem(SK,JSON.stringify(this.data))}showToast(m){this.toast=m;this.render();setTimeout(()=>{this.toast=null;this.render()},3000)}save(k,i){i.betrag=parseFloat(i.betrag)||0;i.gezahlt=parseFloat(i.gezahlt)||0;i.rate=parseFloat(i.rate)||0;if(i.id){this.data[k]=this.data[k].map(x=>x.id===i.id?i:x)}else{i.id=this.data.nextId++;this.data[k].push(i)}this.saveData();this.modal=null;this.showToast("Gespeichert ✓");this.render()}del(k,id){this.data[k]=this.data[k].filter(x=>x.id!==id);this.saveData();this.showToast("Gelöscht");this.render()}renderHome(){const tGL=this.data.glaeubiger.reduce((s,g)=>s+Math.max(0,g.betrag-g.gezahlt),0);const tPS=(this.data.privatSchulden||[]).reduce((s,p)=>s+Math.max(0,p.betrag-p.gezahlt),0);const tKR=this.data.kredite.reduce((s,k)=>s+(k.restschuld||0),0);return`<div class="card"><div style="font-size:12px;color:#64748b;font-weight:700;margin-bottom:8px">👤 GLÄUBIGER OFFEN</div><div style="font-size:28px;font-weight:800;color:#7c3aed">${fmt(tGL)}</div></div><div class="card"><div style="font-size:12px;color:#64748b;font-weight:700;margin-bottom:8px">🤝 PRIVATE SCHULDEN</div><div style="font-size:28px;font-weight:800;color:#db2777">${fmt(tPS)}</div></div><div class="card"><div style="font-size:12px;color:#64748b;font-weight:700;margin-bottom:8px">🏦 KREDITRESTSCHULD</div><div style="font-size:28px;font-weight:800;color:#2563eb">${fmt(tKR)}</div></div><div class="card"><div style="font-size:12px;color:#64748b;font-weight:700;margin-bottom:8px">📋 ÜBERSICHT</div><div style="font-size:13px;line-height:1.8"><div>👤 Gläubiger: ${this.data.glaeubiger.length}</div><div>🤝 Privat: ${this.data.privatSchulden.length}</div><div>🏦 Kredite: ${this.data.kredite.length}</div><div>🛡️ Versicherungen: ${this.data.versicherungen.length}</div><div>📋 Fixkosten: ${this.data.fixkosten.length}</div></div></div>`}renderRaten(){const items=[];this.data.glaeubiger.forEach(g=>{if(g.naechsteRate){items.push({day:new Date(g.naechsteRate).getDate(),name:g.name,betrag:g.rate,farbe:g.farbe,kind:"gl"})}});this.data.kredite.forEach(k=>{if(k.naechsteRate){items.push({day:new Date(k.naechsteRate).getDate(),name:k.name||k.bank||"Kredit",betrag:k.rate,farbe:k.farbe,kind:"kr"})}});this.data.versicherungen.forEach(v=>{if(v.faelligkeit){items.push({day:new Date(v.faelligkeit).getDate(),name:v.name,betrag:v.beitrag,farbe:v.farbe,kind:"vs"})}});(this.data.privatSchulden||[]).forEach(p=>{if(p.naechsteRate){items.push({day:new Date(p.naechsteRate).getDate(),name:p.person,betrag:p.rate,farbe:p.farbe,kind:"ps"})}});if(items.length===0)return`<div class="empty"><div class="empty-icon">📆</div><div style="font-weight:700;font-size:17px;color:#0f172a">Noch keine Raten</div></div>`;const byDay={};items.forEach(i=>{if(!byDay[i.day])byDay[i.day]=[];byDay[i.day].push(i)});const days=Object.keys(byDay).map(Number).sort((a,b)=>a-b);const totale=items.reduce((s,i)=>s+i.betrag,0);return`<div class="card"><div style="font-size:12px;color:#64748b;font-weight:700;margin-bottom:8px">GESAMTE MONATSRATEN</div><div style="font-size:26px;font-weight:800;color:#7c3aed;margin-bottom:2px">${fmt(totale)}</div></div>${days.map(d=>`<div class="raten-day"><div class="raten-day-hdr"><div class="raten-day-num">${d}.</div><div class="raten-day-txt"><div style="font-weight:700;font-size:14px">des Monats</div><div style="font-size:11px;color:#64748b">${byDay[d].length} ${byDay[d].length===1?"Zahlung":"Zahlungen"}</div></div><div style="font-weight:800;font-size:16px;text-align:right"><div>${fmt(byDay[d].reduce((s,x)=>s+x.betrag,0))}</div><div style="font-size:10px;color:#64748b;font-weight:400">fällig</div></div></div>${byDay[d].map(i=>`<div class="raten-item"><div class="raten-dot" style="background:${i.farbe}"></div><div class="raten-name">${i.name}</div><div class="raten-val">${fmt(i.betrag)}</div></div>`).join("")}</div>`).join("")}`}openModal(k,id){this.editIdField=id;this.modal=k;this.render()}closeModal(){this.modal=null;this.editIdField=null;this.render()}getEditData(k,id){if(k==="gl"){const item=this.data.glaeubiger.find(x=>x.id===id);if(!item)return{typ:"Privatperson",betrag:0,gezahlt:0,rate:0,faelligkeit:"",naechsteRate:"",erinnerung:true,erinnerungTage:"5"};return item}if(k==="kr"){const item=this.data.kredite.find(x=>x.id===id);if(!item)return{typ:"Ratenkredit",betrag:0,restschuld:0,rate:0,zinssatz:0,faelligkeit:"",naechsteRate:"",erinnerung:true,erinnerungTage:"5"};return item}if(k==="ps"){const item=this.data.privatSchulden.find(x=>x.id===id);if(!item)return{beziehung:"Familie",betrag:0,gezahlt:0,rate:0,faelligkeit:"",naechsteRate:"",erinnerung:true,erinnerungTage:"5"};return item}if(k==="vs"){const item=this.data.versicherungen.find(x=>x.id===id);if(!item)return{typ:"Haftpflicht",beitrag:0,zahlweise:"monatlich",faelligkeit:"",erinnerung:true,erinnerungTage:"14"};return item}if(k==="fk"){const item=this.data.fixkosten.find(x=>x.id===id);if(!item)return{kategorie:"Wohnen",betrag:0,zahlweise:"monatlich",aktiv:true};return item}return{}}saveGL(){const n=document.getElementById("mname").value;if(!n){alert("Name erforderlich!");return}const i=this.getEditData("gl",this.editIdField);Object.assign(i,{name:n,typ:document.getElementById("mtyp").value,email:document.getElementById("mem").value,telefon:document.getElementById("mtel").value,betrag:parseFloat(document.getElementById("mbet").value)||0,gezahlt:parseFloat(document.getElementById("mgez").value)||0,faelligkeit:document.getElementById("mfael").value,naechsteRate:document.getElementById("mnaech").value,erinnerung:document.getElementById("mrem").checked,erinnerungTage:document.getElementById("mremtg").value});this.save("glaeubiger",i)}saveKR(){const n=document.getElementById("mname").value;if(!n&&!document.getElementById("mbank").value){alert("Name oder Bank erforderlich!");return}const i=this.getEditData("kr",this.editIdField);Object.assign(i,{name:n,typ:document.getElementById("mtyp").value,bank:document.getElementById("mbank").value,betrag:parseFloat(document.getElementById("mbet").value)||0,restschuld:parseFloat(document.getElementById("mrest").value)||0,rate:parseFloat(document.getElementById("mrate").value)||0,zinssatz:parseFloat(document.getElementById("mzins").value)||0,faelligkeit:document.getElementById("mfael").value,naechsteRate:document.getElementById("mnaech").value,erinnerung:document.getElementById("mrem").checked,erinnerungTage:document.getElementById("mremtg").value});this.save("kredite",i)}savePS(){const p=document.getElementById("mpers").value;if(!p){alert("Person erforderlich!");return}const i=this.getEditData("ps",this.editIdField);Object.assign(i,{person:p,beziehung:document.getElementById("mbez").value,betrag:parseFloat(document.getElementById("mbet").value)||0,gezahlt:parseFloat(document.getElementById("mgez").value)||0,grund:document.getElementById("mgrund").value,faelligkeit:document.getElementById("mfael").value,naechsteRate:document.getElementById("mnaech").value,erinnerung:document.getElementById("mrem").checked,erinnerungTage:document.getElementById("mremtg").value});this.save("privatSchulden",i)}saveVS(){const n=document.getElementById("mname").value;if(!n){alert("Name erforderlich!");return}const i=this.getEditData("vs",this.editIdField);Object.assign(i,{name:n,typ:document.getElementById("mtyp").value,anbieter:document.getElementById("manbiet").value,beitrag:parseFloat(document.getElementById("mbet").value)||0,zahlweise:document.getElementById("mzahl").value,faelligkeit:document.getElementById("mfael").value,erinnerung:document.getElementById("mrem").checked,erinnerungTage:document.getElementById("mremtg").value});this.save("versicherungen",i)}saveFK(){const n=document.getElementById("mname").value;if(!n){alert("Name erforderlich!");return}const i=this.getEditData("fk",this.editIdField);Object.assign(i,{name:n,kategorie:document.getElementById("mkat").value,betrag:parseFloat(document.getElementById("mbet").value)||0,zahlweise:document.getElementById("mzahl").value,aktiv:document.getElementById("makti").checked});this.save("fixkosten",i)}render(){const navs=[{k:"home",l:"Übersicht",i:"◉"},{k:"gl",l:"Gläubiger",i:"👤"},{k:"ps",l:"Privat",i:"🤝"},{k:"kr",l:"Kredite",i:"🏦"},{k:"vs",l:"Versicher.",i:"🛡️"},{k:"fk",l:"Fixkosten",i:"📋"},{k:"raten",l:"Raten",i:"📆"}];let cnt="";if(this.tab==="home")cnt=this.renderHome();else if(this.tab==="raten")cnt=this.renderRaten();else if(this.tab==="gl")cnt=`${this.data.glaeubiger.length===0?`<div class="empty"><div class="empty-icon">👤</div><div style="font-weight:700;font-size:17px;color:#0f172a">Noch keine Gläubiger</div></div>`:`${this.data.glaeubiger.map(g=>{const r=Math.max(0,g.betrag-g.gezahlt);const lbl=dlabel(ddiff(g.naechsteRate||g.faelligkeit));return`<div class="card" style="border-left:4px solid ${g.farbe}"><div style
