<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><title>FinanzManager</title><style>*{margin:0;padding:0;box-sizing:border-box}html,body,#app{width:100%;height:100%}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f7fa;color:#0f172a;font-size:18px}input,select,textarea,button{font-family:inherit;font-size:18px;-webkit-tap-highlight-color:transparent}input[type=number]{-moz-appearance:textfield}input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}.app{min-height:100vh;padding-bottom:120px}.header{background:#fff;border-bottom:2px solid #e8edf3;position:sticky;top:0;z-index:40}.hdr{max-width:600px;margin:0 auto;padding:0 16px;display:flex;justify-content:space-between;align-items:center;height:64px}.logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#2563eb);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px}.htxt{flex:1;margin-left:12px}.ht{font-weight:800;font-size:17px}.hs{font-size:12px;color:#64748b}.content{max-width:600px;margin:0 auto;padding:18px}.card{background:#fff;border-radius:18px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:16px}.empty{text-align:center;padding:80px 20px}.empty-icon{font-size:64px;margin-bottom:16px}.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #e8edf3;z-index:40;display:grid;grid-template-columns:repeat(6,1fr)}.nav-item{background:0;border:0;padding:10px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:#64748b;border-top:3px solid transparent;font-size:10px}.nav-item.active{color:#7c3aed;border-top-color:#7c3aed}.nav-icon{font-size:20px}.fab{position:fixed;bottom:90px;right:24px;width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#2563eb);border:0;color:#fff;font-size:32px;cursor:pointer;box-shadow:0 6px 24px rgba(99,66,237,.5);z-index:50}.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);display:flex;align-items:flex-end;z-index:200}.modal{background:#fff;border-radius:24px 24px 0 0;width:100%;padding:0 0 48px;max-height:95vh;overflow-y:auto}.modal-hdr{display:flex;justify-content:space-between;align-items:center;padding:20px 24px}.modal-hdr h2{margin:0;font-weight:800;font-size:22px}.modal-close{background:#f1f5f9;border:0;border-radius:50%;width:44px;height:44px;cursor:pointer;font-size:20px}.modal-content{padding:0 24px;display:flex;flex-direction:column;gap:18px}.form-label{font-size:11px;color:#64748b;font-weight:800;margin-bottom:8px;text-transform:uppercase}.inp,.sel{background:#f8fafc;border:1.5px solid #e8edf3;border-radius:14px;padding:16px;color:#0f172a;font-size:18px;outline:0;width:100%}.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:28px 24px 0}.btn-cancel{background:#f1f5f9;border:2px solid #e8edf3;border-radius:16px;padding:18px;color:#64748b;cursor:pointer;font-family:inherit;font-weight:800}.btn-save{background:#7c3aed;border:0;border-radius:16px;padding:18px;color:#fff;cursor:pointer;font-family:inherit;font-weight:800}.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:#16a34a;color:#fff;border-radius:16px;padding:16px 24px;font-weight:700;z-index:300}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.item-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);border-left:5px solid}.item-btn{flex:1;background:#f8fafc;border:1px solid #e8edf3;border-radius:12px;padding:11px;color:#0f172a;cursor:pointer;font-family:inherit;font-weight:700;font-size:14px;margin-top:12px}.item-btn-del{background:#fff1f2;border-color:#fecdd3;color:#dc2626;padding:11px 13px;flex:0;margin-left:8px}.raten-day{background:#fff;border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.08)}.raten-day-num{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#2563eb);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px}.raten-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #e8edf3}.raten-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}.raten-name{flex:1;font-weight:700}</style></head><body><div id="app"></div><script>const SK="finanzapp_v5";const fmt=v=>new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR"}).format(v||0);let app;class FM{constructor(){this.tab="home";this.data={glaeubiger:[],kredite:[],versicherungen:[],fixkosten:[],nextId:1};this.modal=null;this.toast=null;this.editId=null;this.loadData();this.render()}loadData(){const r=localStorage.getItem(SK);if(r)try{this.data=JSON.parse(r);if(!this.data.fixkosten)this.data.fixkosten=[]}catch(e){}}saveData(){localStorage.setItem(SK,JSON.stringify(this.data))}showToast(m){this.toast=m;this.render();setTimeout(()=>{this.toast=null;this.render()},3000)}save(k,item){item.betrag=parseFloat(item.betrag)||0;item.restschuld=parseFloat(item.restschuld)||0;item.rate=parseFloat(item.rate)||0;item.gezahlt=parseFloat(item.gezahlt)||0;item.beitrag=parseFloat(item.beitrag)||0;if(item.id){this.data[k]=this.data[k].map(x=>x.id===item.id?item:x)}else{item.id=this.data.nextId++;this.data[k].push(item)}this.saveData();this.modal=null;this.showToast("Gespeichert ✓");this.render()}del(k,id){this.data[k]=this.data[k].filter(x=>x.id!==id);this.saveData();this.showToast("Gelöscht");this.render()}renderHome(){const tGL=this.data.glaeubiger.reduce((s,g)=>s+Math.max(0,g.betrag-g.gezahlt),0);const tKR=this.data.kredite.reduce((s,k)=>s+(parseFloat(k.restschuld)||0),0);const tVS=this.data.versicherungen.reduce((s,v)=>s+(parseFloat(v.beitrag)||0),0);return`<div class="card"><div style="font-size:12px;color:#64748b;font-weight:800;margin-bottom:8px">👤 GLÄUBIGER</div><div style="font-size:32px;font-weight:800;color:#7c3aed">${fmt(tGL)}</div></div><div class="card"><div style="font-size:12px;color:#64748b;font-weight:800;margin-bottom:8px">🏦 KREDITE</div><div style="font-size:32px;font-weight:800;color:#2563eb">${fmt(tKR)}</div></div><div class="card"><div style="font-size:12px;color:#64748b;font-weight:800;margin-bottom:8px">🛡️ VERSICHERUNGEN</div><div style="font-size:32px;font-weight:800;color:#059669">${fmt(tVS)}</div></div>`}renderRaten(){const items=[];this.data.glaeubiger.forEach(g=>{const rate=parseFloat(g.rate);const day=parseInt(g.faelligkeitstag);if(!isNaN(rate)&&rate>0&&!isNaN(day)&&day>0){items.push({day:day,name:g.name,betrag:rate,farbe:"#7c3aed"})}});this.data.kredite.forEach(k=>{const rate=parseFloat(k.rate);const day=parseInt(k.faelligkeitstag);if(!isNaN(rate)&&rate>0&&!isNaN(day)&&day>0){items.push({day:day,name:k.name||k.bank||"Kredit",betrag:rate,farbe:"#2563eb"})}});this.data.versicherungen.forEach(v=>{const beitrag=parseFloat(v.beitrag);const day=parseInt(v.faelligkeitstag);if(!isNaN(beitrag)&&beitrag>0&&!isNaN(day)&&day>0){items.push({day:day,name:v.name,betrag:beitrag,farbe:"#059669"})}});if(items.length===0)return`<div class="empty"><div class="empty-icon">📆</div><div>Noch keine Raten</div></div>`;const byDay={};items.forEach(i=>{if(!byDay[i.day])byDay[i.day]=[];byDay[i.day].push(i)});const days=Object.keys(byDay).map(Number).sort((a,b)=>a-b);const totale=items.reduce((s,i)=>s+i.betrag,0);return`<div class="card"><div style="font-size:12px;color:#64748b;font-weight:800;margin-bottom:8px">💰 MONATSRATEN</div><div style="font-size:32px;font-weight:800;color:#7c3aed;margin-bottom:4px">${fmt(totale)}</div></div>${days.map(d=>`<div class="raten-day"><div style="display:flex;gap:12px;align-items:center;margin-bottom:12px"><div class="raten-day-num">${d}.</div><div style="flex:1"><div style="font-weight:800">des Monats</div><div style="font-size:12px;color:#64748b">${(byDay[d]||[]).length} Zahlung${(byDay[d]||[]).length===1?"":"en"}</div></div><div style="font-weight:800">${fmt((byDay[d]||[]).reduce((s,x)=>s+x.betrag,0))}</div></div>${(byDay[d]||[]).map(i=>`<div class="raten-item"><div class="raten-dot" style="background:${i.farbe}"></div><div class="raten-name">${i.name}</div><div style="font-weight:800">${fmt(i.betrag)}</div></div>`).join("")}</div>`).join("")}`}renderGL(){if(!this.data.glaeubiger.length)return`<div class="empty"><div class="empty-icon">👤</div></div>`;return this.data.glaeubiger.map(g=>{const r=Math.max(0,g.betrag-g.gezahlt);return`<div class="item-card" style="border-left-color:#7c3aed"><div style="font-weight:800;font-size:18px">${g.name}</div><div style="font-size:13px;color:#64748b">${g.typ}</div><div style="font-weight:800;font-size:18px;color:#7c3aed;margin:8px 0">${fmt(r)}</div><button class="item-btn" onclick="app.openModal('gl',${g.id})">✏️ Bearbeiten</button><button class="item-btn-del" onclick="app.del('glaeubiger',${g.id})">🗑</button></div>`}).join("")}renderKR(){if(!this.data.kredite.length)return`<div class="empty"><div class="empty-icon">🏦</div></div>`;return this.data.kredite.map(k=>{return`<div class="item-card" style="border-left-color:#2563eb"><div style="font-weight:800;font-size:18px">${k.name||k.bank||"Kredit"}</div><div style="font-size:13px;color:#64748b">${k.typ}</div><div style="font-weight:800;font-size:18px;color:#2563eb;margin:8px 0">${fmt(k.restschuld||0)}</div><div style="font-size:14px;margin:8px 0"><strong>Rate:</strong> ${fmt(k.rate||0)}/Mo</div><button class="item-btn" onclick="app.openModal('kr',${k.id})">✏️ Bearbeiten</button><button class="item-btn-del" onclick="app.del('kredite',${k.id})">🗑</button></div>`}).join("")}renderVS(){if(!this.data.versicherungen.length)return`<div class="empty"><div class="empty-icon">🛡️</div></div>`;return this.data.versicherungen.map(v=>{return`<div class="item-card" style="border-left-color:#059669"><div style="font-weight:800;font-size:18px">${v.name}</div><div style="font-size:13px;color:#64748b">${v.typ}</div><div style="font-weight:800;font-size:18px;color:#059669;margin:8px 0">${fmt(v.beitrag||0)}</div><div style="font-size:14px;margin:8px 0">${v.anbieter||"−"}</div><button class="item-btn" onclick="app.openModal('vs',${v.id})">✏️ Bearbeiten</button><button class="item-btn-del" onclick="app.del('versicherungen',${v.id})">🗑</button></div>`}).join("")}renderFK(){if(!this.data.fixkosten.length)return`<div class="empty"><div class="empty-icon">📋</div></div>`;return this.data.fixkosten.map(f=>{const mo=f.zahlweise==="monatlich"?f.betrag:f.zahlweise==="vierteljährlich"?f.betrag/3:f.zahlweise==="halbjährlich"?f.betrag/6:f.betrag/12;return`<div class="item-card" style="border-left-color:#0891b2"><div style="font-weight:800;font-size:18px">${f.name}</div><div style="font-size:13px;color:#64748b">${f.kategorie}</div><div style="font-weight:800;font-size:18px;color:#0891b2;margin:8px 0">${fmt(f.betrag||0)}</div><div style="font-size:14px;margin:8px 0">${fmt(mo)}/M</div><button class="item-btn" onclick="app.openModal('fk',${f.id})">✏️ Bearbeiten</button><button class="item-btn-del" onclick="app.del('fixkosten',${f.id})">🗑</button></div>`}).join("")}openModal(k,id){this.editId=id;this.modal=k;this.render()}closeModal(){this.modal=null;this.editId=null;this.render()}getItem(k,id){if(k==="gl")return this.data.glaeubiger.find(x=>x.id===id)||{typ:"Privatperson",betrag:0,gezahlt:0,rate:0,faelligkeitstag:""};if(k==="kr")return this.data.kredite.find(x=>x.id===id)||{typ:"Ratenkredit",betrag:0,restschuld:0,rate:0,zinssatz:0,faelligkeitstag:"",bank:""};if(k==="vs")return this.data.versicherungen.find(x=>x.id===id)||{typ:"Haftpflicht",beitrag:0,zahlweise:"monatlich",faelligkeitstag:"",anbieter:""};if(k==="fk")return this.data.fixkosten.find(x=>x.id===id)||{kategorie:"Wohnen",betrag:0,zahlweise:"monatlich",name:""};return{}}saveGL(){const n=document.getElementById("glname")?.value;if(!n){alert("Name erforderlich!");return}const i=this.getItem("gl",this.editId);i.id=this.editId;i.name=n;i.typ=document.getElementById("gltyp")?.value||"Privatperson";i.email=document.getElementById("glemail")?.value||"";i.telefon=document.getElementById("gltel")?.value||"";i.betrag=parseFloat(document.getElementById("glbet")?.value)||0;i.gezahlt=parseFloat(document.getElementById("glgez")?.value)||0;i.rate=parseFloat(document.getElementById("glrate")?.value)||0;i.faelligkeitstag=document.getElementById("glfael")?.value||"";this.save("glaeubiger",i)}saveKR(){const n=document.getElementById("krname")?.value||"";const b=document.getElementById("krbank")?.value||"";if(!n&&!b){alert("Name oder Bank erforderlich!");return}const i=this.getItem("kr",this.editId);i.id=this.editId;i.name=n;i.bank=b;i.typ=document.getElementById("krtyp")?.value||"Ratenkredit";i.betrag=parseFloat(document.getElementById("krbet")?.value)||0;i.restschuld=parseFloat(document.getElementById("krrest")?.value)||0;i.rate=parseFloat(document.getElementById("krrate")?.value)||0;i.zinssatz=parseFloat(document.getElementById("krzins")?.value)||0;i.faelligkeitstag=document.getElementById("krfael")?.value||"";this.save("kredite",i)}saveVS(){const n=document.getElementById("vsname")?.value;if(!n){alert("Name erforderlich!");return}const i=this.getItem("vs",this.editId);i.id=this.editId;i.name=n;i.typ=document.getElementById("vstyp")?.value||"Haftpflicht";i.anbieter=document.getElementById("vsanbiet")?.value||"";i.beitrag=parseFloat(document.getElementById("vsbet")?.value)||0;i.zahlweise=document.getElementById("vszahl")?.value||"monatlich";i.faelligkeitstag=document.getElementById("vsfael")?.value||"";this.save("versicherungen",i)}saveFK(){const n=document.getElementById("fkname")?.value;if(!n){alert("Name erforderlich!");return}const i=this.getItem("fk",this.editId);i.id=this.editId;i.name=n;i.kategorie=document.getElementById("fkkat")?.value||"Wohnen";i.betrag=parseFloat(document.getElementById("fkbet")?.value)||0;i.zahlweise=document.getElementById("fkzahl")?.value||"monatlich";this.save("fixkosten",i)}render(){const navs=[{k:"home",l:"Übersicht",i:"◉"},{k:"gl",l:"Gläubiger",i:"👤"},{k:"kr",l:"Kredite",i:"🏦"},{k:"vs",l:"Versicher.",i:"🛡️"},{k:"fk",l:"Fixkosten",i:"📋"},{k:"raten",l:"Raten",i:"📆"}];let cnt="";if(this.tab==="home")cnt=this.renderHome();else if(this.tab==="raten")cnt=this.renderRaten();else if(this.tab==="gl")cnt=this.renderGL();else if(this.tab==="kr")cnt=this.renderKR();else if(this.tab==="vs")cnt=this.renderVS();else if(this.tab==="fk")cnt=this.renderFK();let modal="";if(this.modal){const m=this.getItem(this.modal,this.editId);if(this.modal==="gl")modal=`<div class="modal-bg"><div class="modal"><div class="modal-hdr"><h2>Gläubiger</h2><button class="modal-close" onclick="app.closeModal()">✕</button></div><div class="modal-content"><div><label class="form-label">Name</label><input type="text" class="inp" id="glname" value="${m.name||""}"></div><div class="grid2"><div><label class="form-label">Typ</label><select class="sel" id="gltyp"><option>Privatperson</option><option>Unternehmen</option><option>Bank</option></select></div><div><label class="form-label">Betrag (€)</label><input type="number" class="inp" id="glbet" value="${m.betrag||""}"></div></div><div class="grid2"><div><label class="form-label">Gezahlt (€)</label><input type="number" class="inp" id="glgez" value="${m.gezahlt||0}"></div><div><label class="form-label">Rate (€)</label><input type="number" class="inp" id="glrate" value="${m.rate||""}"></div></div><div class="grid2"><div><label class="form-label">Fälligkeitstag</label><input type="number" min="1" max="31" class="inp" id="glfael" value="${m.faelligkeitstag||""}"></div><div><label class="form-label">E-Mail</label><input type="email" class="inp" id="glemail" value="${m.email||""}"></div></div><div><label class="form-label">Telefon</label><input type="tel" class="inp" id="gltel" value="${m.telefon||""}"></div></div><div class="modal-btns"><button class="btn-cancel" onclick="app.closeModal()">Abbrechen</button><button class="btn-save" onclick="app.saveGL()">Speichern</button></div></div></div>`;else if(this.modal==="kr")modal=`<div class="modal-bg"><div class="modal"><div class="modal-hdr"><h2>Kredit</h2><button class="modal-close" onclick="app.closeModal()">✕</button></div><div class="modal-content"><div><label class="form-label">Name</label><input type="text" class="inp" id="krname" value="${m.name||""}"></div><div><label class="form-label">Bank</label><input type="text" class="inp" id="krbank" value="${m.bank||""}"></div><div class="grid2"><div><label class="form-label">Restschuld (€)</label><input type="number" class="inp" id="krrest" value="${m.restschuld||""}"></div><div><label class="form-label">Rate (€)</label><input type="number" class="inp" id="krrate" value="${m.rate||""}"></div></div><div class="grid2"><div><label class="form-label">Typ</label><select class="sel" id="krtyp"><option>Ratenkredit</option><option>Autokredit</option><option>Immobilie</option></select></div><div><label class="form-label">Zinssatz (%)</label><input type="number" class="inp" id="krzins" value="${m.zinssatz||""}"></div></div><div><label class="form-label">Fälligkeitstag</label><input type="number" min="1" max="31" class="inp" id="krfael" value="${m.faelligkeitstag||""}"></div></div><div class="modal-btns"><button class="btn-cancel" onclick="app.closeModal()">Abbrechen</button><button class="btn-save" onclick="app.saveKR()">Speichern</button></div></div></div>`;else if(this.modal==="vs")modal=`<div class="modal-bg"><div class="modal"><div class="modal-hdr"><h2>Versicherung</h2><button class="modal-close" onclick="app.closeModal()">✕</button></div><div class="modal-content"><div><label class="form-label">Name</label><input type="text" class="inp" id="vsname" value="${m.name||""}"></div><div class="grid2"><div><label class="form-label">Typ</label><select class="sel" id="vstyp"><option>Haftpflicht</option><option>KFZ</option><option>Hausrat</option><option>Lebensversicherung</option><option>Kranken</option></select></div><div><label class="form-label">Beitrag (€)</label><input type="number" class="inp" id="vsbet" value="${m.beitrag||""}"></div></div><div class="grid2"><div><label class="form-label">Anbieter</label><input type="text" class="inp" id="vsanbiet" value="${m.anbieter||""}"></div><div><label class="form-label">Zahlweise</label><select class="sel" id="vszahl"><option>monatlich</option><option>vierteljährlich</option><option>halbjährlich</option><option>jährlich</option></select></div></div><div><label class="form-label">Fälligkeitstag</label><input type="number" min="1" max="31" class="inp" id="vsfael" value="${m.faelligkeitstag||""}"></div></div><div class="modal-btns"><button class="btn-cancel" onclick="app.closeModal()">Abbrechen</button><button class="btn-save" onclick="app.saveVS()">Speichern</button></div></div></div>`;else if(this.modal==="fk")modal=`<div class="modal-bg"><div class="modal"><div class="modal-hdr"><h2>Fixkosten</h2><button class="modal-close" onclick="app.closeModal()">✕</button></div><div class="modal-content"><div><label class="form-label">Name</label><input type="text" class="inp" id="fkname" value="${m.name||""}"></div><div class="grid2"><div><label class="form-label">Kategorie</label><select class="sel" id="fkkat"><option>Wohnen</option><option>Energie</option><option>Kommunikation</option><option>Streaming</option><option>Sport</option><option>Familie</option><option>Cloud</option><option>Sonstige</option></select></div><div><label class="form-label">Betrag (€)</label><input type="number" class="inp" id="fkbet" value="${m.betrag||""}"></div></div><div><label class="form-label">Zahlweise</label><select class="sel" id="fkzahl"><option>monatlich</option><option>vierteljährlich</option><option>halbjährlich</option><option>jährlich</option></select></div></div><div class="modal-btns"><button class="btn-cancel" onclick="app.closeModal()">Abbrechen</button><button class="btn-save" onclick="app.saveFK()">Speichern</button></div></div></div>`}document.getElementById("app").innerHTML=`<div class="app"><div class="header"><div class="hdr"><div style="display:flex;align-items:center"><div class="logo">F</div><div class="htxt"><div class="ht">FinanzManager</div><div class="hs">Deine Finanzen</div></div></div></div></div><div class="content">${cnt}</div><div class="nav">${navs.map(n=>`<button class="nav-item ${this.tab===n.k?"active":""}" onclick="app.tab='${n.k}';app.render()"><span class="nav-icon">${n.i}</span><span class="nav-label" style="font-size:9px">${n.l}</span></button>`).join("")}</div><button class="fab" onclick="app.openModal(app.tab,null)">+</button>${modal}${this.toast?`<div class="toast">✓ ${this.toast}</div>`:""}</div>`}}app=new FM();window.app=app</script></body></html>
