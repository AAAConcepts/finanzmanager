<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><title>FinanzManager</title><style>*{margin:0;padding:0;box-sizing:border-box}html,body,#app{width:100%;height:100%}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f7fa;color:#0f172a;font-size:18px}input,select,textarea,button{font-family:inherit;font-size:18px;-webkit-tap-highlight-color:transparent}input[type=number]{-moz-appearance:textfield}input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}.app{min-height:100vh;padding-bottom:120px}.header{background:#fff;border-bottom:2px solid #e8edf3;position:sticky;top:0;z-index:40;box-shadow:0 2px 8px rgba(0,0,0,.08)}.hdr{max-width:600px;margin:0 auto;padding:0 16px;display:flex;justify-content:space-between;align-items:center;height:64px}.logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#2563eb);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px}.htxt{flex:1;margin-left:12px}.ht{font-weight:800;font-size:17px;line-height:1.1}.hs{font-size:12px;color:#64748b;margin-top:2px}.hbtn{width:44px;height:44px;border-radius:12px;border:1.5px solid #e8edf3;background:#f8fafc;cursor:pointer;font-size:20px}.content{max-width:600px;margin:0 auto;padding:18px}.card{background:#fff;border-radius:18px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:16px}.card-title{font-weight:800;font-size:16px;margin-bottom:12px;color:#64748b;text-transform:uppercase;letter-spacing:.5px}.empty{text-align:center;padding:80px 20px;color:#64748b}.empty-icon{font-size:64px;margin-bottom:16px}.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #e8edf3;z-index:40;box-shadow:0 -2px 12px rgba(0,0,0,.08)}.nav-in{max-width:600px;margin:0 auto;display:flex}.nav-item{flex:1;background:0;border:0;padding:12px 0 10px;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:inherit;cursor:pointer;color:#64748b;border-top:3px solid transparent;font-size:11px}.nav-item.active{color:#7c3aed;border-top-color:#7c3aed}.nav-icon{font-size:22px;line-height:1}.nav-label{font-weight:600}.nav-item.active .nav-label{font-weight:800}.fab{position:fixed;bottom:90px;right:24px;width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#2563eb);border:0;color:#fff;font-size:32px;cursor:pointer;box-shadow:0 6px 24px rgba(99,66,237,.5);z-index:50}.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);display:flex;align-items:flex-end;z-index:200}.modal{background:#fff;border-radius:24px 24px 0 0;width:100%;padding:0 0 48px;max-height:95vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.15)}.modal-drag{display:flex;justify-content:center;padding-top:14px;margin-bottom:8px}.modal-handle{width:44px;height:5px;border-radius:99px;background:#e2e8f0}.modal-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 24px 20px}.modal-hdr h2{margin:0;font-weight:800;font-size:22px}.modal-close{background:#f1f5f9;border:0;border-radius:50%;width:44px;height:44px;color:#64748b;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}.modal-content{padding:0 24px;display:flex;flex-direction:column;gap:18px}.form-group{display:flex;flex-direction:column}.form-label{font-size:12px;color:#64748b;font-weight:800;margin-bottom:8px;text-transform:uppercase;letter-spacing:.6px}.inp,.sel{background:#f8fafc;border:1.5px solid #e8edf3;border-radius:14px;padding:16px;color:#0f172a;font-size:18px;outline:0;width:100%}.sel{cursor:pointer}.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:28px 24px 0}.btn{border-radius:16px;padding:18px;font-family:inherit;font-weight:800;font-size:17px;cursor:pointer;border:0}.btn-cancel{background:#f1f5f9;border:2px solid #e8edf3;color:#64748b}.btn-save{background:#7c3aed;color:#fff;box-shadow:0 6px 18px rgba(124,58,237,.4)}.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:#16a34a;color:#fff;border-radius:16px;padding:16px 24px;font-weight:700;font-size:16px;box-shadow:0 6px 24px rgba(0,0,0,.25);z-index:300}.item-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 2px 12px rgba(0,0,0,.08);border-left:4px solid}.item-left{flex:1;min-width:0}.item-name{font-weight:700;font-size:16px}.item-type{font-size:12px;color:#64748b;margin-top:3px}.item-btns{display:flex;gap:10px;margin-top:10px}.item-btn{flex:1;background:#f8fafc;border:1px solid #e8edf3;border-radius:12px;padding:11px;color:#0f172a;cursor:pointer;font-family:inherit;font-weight:700;font-size:14px}.item-btn-del{background:#fff1f2;border-color:#fecdd3;color:#dc2626;padding:11px 13px;flex:0}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.raten-day{background:#fff;border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.08)}.raten-day-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.raten-day-num{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#2563eb);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px}.raten-day-txt{flex:1;margin-left:12px}.raten-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #e8edf3;font-size:15px}.raten-item:last-child{border-bottom:0}.raten-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}.raten-name{flex:1;font-weight:700}.raten-val{font-weight:800;white-space:nowrap;font-size:16px}</style></head><body><div id="app"></div><script>const SK="finanzapp_v5";const fmt=v=>new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR"}).format(v||0);const fmtD=d=>d?new Date(d).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"}):"–";const GL_TYP=["Privatperson","Unternehmen","Bank"];const KR_TYP=["Ratenkredit","Autokredit","Immobilie"];const VS_TYP=["Haftpflicht","KFZ","Hausrat","Lebensversicherung","Kranken"];const PS_BEZ=["Familie","Freund/in","Bekannte/r","Kollege/in"];const ddiff=iso=>iso?Math.ceil((new Date(iso)-new Date())/86400000):null;const dlabel=diff=>{if(diff===null)return null;if(diff<0)return{text:Math.abs(diff)+"d überfällig",bg:"#fee2e2",col:"#dc2626"};if(diff===0)return{text:"Heute!",bg:"#fee2e2",col:"#dc2626"};if(diff===1)return{text:"Morgen",bg:"#fef3c7",col:"#d97706"};if(diff<=7)return{text:"in "+diff+"d",bg:"#fef9c3",col:"#b45309"};if(diff<=30)return{text:"in "+diff+"d",bg:"#f0fdf4",col:"#16a34a"};return{text:"in "+diff+"d",bg:"#f8fafc",col:"#9ca3af"}};class FM{constructor(){this.tab="home";this.data={glaeubiger:[],kredite:[],versicherungen:[],privatSchulden:[],fixkosten:[],nextId:1};this.modal=null;this.toast=null;this.editIdField=null;this.loadData();this.render()}loadData(){const r=localStorage.getItem(SK);if(r)try{this.data=JSON.parse(r);if(!this.data.privatSchulden)this.data.privatSchulden=[];if(!this.data.fixkosten)this.data.fixkosten=[]}catch(e){}}saveData(){localStorage.setItem(SK,JSON.stringify(this.data))}showToast(m){this.toast=m;this.render();setTimeout(()=>{this.toast=null;this.render()},3000)}save(k,i){i.betrag=parseFloat(i.betrag)||0;i.gezahlt=parseFloat(i.gezahlt)||0;i.rate=parseFloat(i.rate)||0;if(i.id){this.data[k]=this.data[k].map(x=>x.id===i.id?i:x)}else{i.id=this.data.nextId++;this.data[k].push(i)}this.saveData();this.modal=null;this.showToast("Gespeichert ✓");this.render()}del(k,id){this.data[k]=this.data[k].filter(x=>x.id!==id);this.saveData();this.showToast("Gelöscht");this.render()}renderHome(){const tGL=this.data.glaeubiger.reduce((s,g)=>s+Math.max(0,g.betrag-g.gezahlt),0);const tPS=(this.data.privatSchulden||[]).reduce((s,p)=>s+Math.max(0,p.betrag-p.gezahlt),0);const tKR=this.data.kredite.reduce((s,k)=>s+(k.restschuld||0),0);return`<div class="card"><div class="card-title">👤 Gläubiger offen</div><div style="font-size:32px;font-weight:800;color:#7c3aed">${fmt(tGL)}</div></div><div class="card"><div class="card-title">🤝 Private Schulden</div><div style="font-size:32px;font-weight:800;color:#db2777">${fmt(tPS)}</div></div><div class="card"><div class="card-title">🏦 Kreditrestschuld</div><div style="font-size:32px;font-weight:800;color:#2563eb">${fmt(tKR)}</div></div><div class="card"><div class="card-title">📋 Übersicht</div><div style="font-size:15px;line-height:1.9"><div>👤 Gläubiger: ${this.data.glaeubiger.length}</div><div>🤝 Privat: ${this.data.privatSchulden.length}</div><div>🏦 Kredite: ${this.data.kredite.length}</div><div>🛡️ Versicherungen: ${this.data.versicherungen.length}</div><div>📋 Fixkosten: ${this.data.fixkosten.length}</div></div></div>`}renderRaten(){const items=[];this.data.glaeubiger.forEach(g=>{if(g.rate&&g.faelligkeitstag){items.push({day:parseInt(g.faelligkeitstag),name:g.name,betrag:g.rate,farbe:g.farbe,kind:"gl"})}});this.data.kredite.forEach(k=>{if(k.rate&&k.faelligkeitstag){items.push({day:parseInt(k.faelligkeitstag),name:k.name||k.bank||"Kredit",betrag:k.rate,farbe:k.farbe,kind:"kr"})}});this.data.versicherungen.forEach(v=>{if(v.beitrag&&v.faelligkeitstag){items.push({day:parseInt(v.faelligkeitstag),name:v.name,betrag:v.beitrag,farbe:v.farbe,kind:"vs"})}});(this.data.privatSchulden||[]).forEach(p=>{if(p.rate&&p.faelligkeitstag){items.push({day:parseInt(p.faelligkeitstag),name:p.person,betrag:p.rate,farbe:p.farbe,kind:"ps"})}});if(items.length===0)return`<div class="empty"><div class="empty-icon">📆</div><div style="font-weight:700;font-size:20px;color:#0f172a">Noch keine Raten</div><div style="font-size:14px;color:#64748b;margin-top:8px">Gib einen "Fälligkeitstag" (z.B. 15) ein!</div></div>`;const byDay={};items.forEach(i=>{if(!byDay[i.day])byDay[i.day]=[];byDay[i.day].push(i)});const days=Object.keys(byDay).map(Number).sort((a,b)=>a-b);const totale=items.reduce((s,i)=>s+i.betrag,0);return`<div class="card"><div class="card-title">💰 Gesamte Monatsraten</div><div style="font-size:32px;font-weight:800;color:#7c3aed;margin-bottom:4px">${fmt(totale)}</div></div>${days.map(d=>`<div class="raten-day"><div class="raten-day-hdr"><div class="raten-day-num">${d}.</div><div class="raten-day-txt"><div style="font-weight:800;font-size:16px">des Monats</div><div style="font-size:12px;color:#64748b">${byDay[d].length} ${byDay[d].length===1?"Zahlung":"Zahlungen"}</div></div><div style="font-weight:800;font-size:17px;text-align:right"><div>${fmt(byDay[d].reduce((s,x)=>s+x.betrag,0))}</div><div style="font-size:11px;color:#64748b;font-weight:600">fällig</div></div></div>${byDay[d].map(i=>`<div class="raten-item"><div class="raten-dot" style="background:${i.farbe}"></div><div class="raten-name">${i.name}</div><div class="raten-val">${fmt(i.betrag)}</div></div>`).join("")}</div>`).join("")}`}openModal(k,id){this.editIdField=id;this.modal=k;this.render()}closeModal(){this.modal=null;this.editIdField=null;this.render()}getEditData(k,id){if(k==="gl"){const item=this.data.glaeubiger.find(x=>x.id===id);if(!item)return{typ:"Privatperson",betrag:0,gezahlt:0,rate:0,faelligkeitstag:"",erinnerung:true,erinnerungTage:"5"};return item}if(k==="kr"){const item=this.data.kredite.find(x=>x.id===id);if(!item)return{typ:"Ratenkredit",betrag:0,restschuld:0,rate:0,zinssatz:0,faelligkeitstag:"",erinnerung:true,erinnerungTage:"5"};return item}if(k==="ps"){const item=this.data.privatSchulden.find(x=>x.id===id);if(!item)return{beziehung:"Familie",betrag:0,gezahlt:0,rate:0,faelligkeitstag:"",erinnerung:true,erinnerungTage:"5"};return item}if(k==="vs"){const item=this.data.versicherungen.find(x=>x.id===id);if(!item)return{typ:"Haftpflicht",beitrag:0,zahlweise:"monatlich",faelligkeitstag:"",erinnerung:true,erinnerungTage:"14"};return item}if(k==="fk"){const item=this.data.fixkosten.find(x=>x.id===id);if(!item)return{kategorie:"Wohnen",betrag:0,zahlweise:"monatlich",aktiv:true};return item}return{}}saveGL(){const n=document.getElementById("mname").value;if(!n){alert("Name erforderlich!");return}const i=this.getEditData("gl",this.editIdField);Object.assign(i,{name:n,typ:document.getElementById("mtyp").value,email:document.getElementById("mem").value,telefon:document.getElementById("mtel").value,betrag:parseFloat(document.getElementById("mbet").value)||0,gezahlt:parseFloat(document.getElementById("mgez").value)||0,rate:parseFloat(document.getElementById("mrate").value)||0,faelligkeitstag:document.getElementById("mfael").value,erinnerung:document.getElementById("mrem").checked,erinnerungTage:document.getElementById("mremtg").value});this.save("glaeubiger",i)}saveKR(){const n=document.getElementById("mname").value;if(!n&&!document.getElementById("mbank").value){alert("Name oder Bank erforderlich!");return}const i=this.getEditData("kr",this.editIdField);Object.assign(i,{name:n,typ:document.getElementById("mtyp").value,bank:document.getElementById("mbank").value,betrag:parseFloat(document.getElementById("mbet").value)||0,restschuld:parseFloat(document.getElementById("mrest").value)||0,rate:parseFloat(document.getElementById("mrate").value)||0,zinssatz:parseFloat(document.getElementById("mzins").value)||0,faelligkeitstag:document.getElementById("mfael").value,erinnerung:document.getElementById("mrem").checked,erinnerungTage:document.getElementById("mremtg").value});this.save("kredite",i)}savePS(){const p=document.getElementById("mpers").value;if(!p){alert("Person erforderlich!");return}const i=this.getEditData("ps",this.editIdField);Object.assign(i,{person:p,beziehung:document.getElementById("mbez").value,betrag:parseFloat(document.getElementById("mbet").value)||0,gezahlt:parseFloat(document.getElementById("mgez").value)||0,rate:parseFloat(document.getElementById("mrate").value)||0,faelligkeitstag:document.getElementById("mfael").value,erinnerung:document.getElementById("mrem").checked,erinnerungTage:document.getElementById("mremtg").value});this.save("privatSchulden",i)}saveVS(){const n=document.getElementById("mname").value;if(!n){alert("Name erforderlich!");return}const i=this.getEditData("vs",this.editIdField);Object.assign(i,{name:n,typ:document.getElementById("mtyp").value,anbieter:document.getElementById("manbiet").value,beitrag:parseFloat(document.getElementById("mbet").value)||0,zahlweise:document.getElementById("mzahl").value,faelligkeitstag:document.getElementById("mfael").value,erinnerung:document.getElementById("mrem").checked,erinnerungTage:document.getElementById("mremtg").value});this.save("versicherungen",i)}saveFK(){const n=document.getElementById("mname").value;if(!n){alert("Name erforderlich!");return}const i=this.getEditData("fk",this.editIdField);Object.assign(i,{name:n,kategorie:document.getElementById("mkat").value,betrag:parseFloat(document.getElementById("mbet").value)||0,zahlweise:document.getElementById("mzahl").value,aktiv:document.getElementById("makti").checked});this.save("fixkosten",i)}render(){const navs=[{k:"home",l:"Übersicht",i:"◉"},{k:"gl",l:"Gläubiger",i:"👤"},{k:"ps",l:"Privat",i:"🤝"},{k:"kr",l:"Kredite",i:"🏦"},{k:"vs",l:"Versicher.",i:"🛡️"},{k:"fk",l:"Fixkosten",i:"📋"},{k:"raten",l:"Raten",i:"📆"}];let cnt="";if(this.tab==="home")cnt=this.renderHome();else if(this.tab==="raten")cnt=this.renderRaten();else if(this.tab==="gl")cnt=`${this.data.glaeubiger.length===0?`<div class="empty"><div class="empty-icon">👤</div><div style="font-weight:700;font-size:20px;color:#0f172a">Noch keine Gläubiger</div></div>`:`${this.data.glaeubiger.map(g=>{const r=Math.max(0,g.betrag-g.gezahlt);return`<div class="card" style="border-left:5px solid ${g.farbe}"><div style="display:flex;justify-content:space-between;margin-bottom:12px"><div><div style="font-weight:800;font-size:18px">${g.name}</div><div style="font-size:13px;color:#64748b">${g.typ}</div></di
