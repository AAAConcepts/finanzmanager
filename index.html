<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FinanzManager">
  <title>FinanzManager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; color: #0f172a; font-size: 16px; }
    html, body, #app { width: 100%; height: 100%; }
    input, select, textarea, button { font-family: inherit; font-size: 16px; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    button { -webkit-tap-highlight-color: transparent; }
    input, select { -webkit-appearance: none; -moz-appearance: none; }
    select { background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor'%3e%3cpath d='M6 9l6 6 6-6'/%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 8px center; background-size: 20px; padding-right: 28px; }
    
    .hidden { display: none !important; }
    .container { max-width: 600px; margin: 0 auto; }
    
    /* PIN Screen */
    .pw-screen { min-height: 100vh; background: linear-gradient(160deg, #f5f3ff, #eff6ff); display: flex; align-items: center; justify-content: center; padding: 24px; }
    .pw-box { width: 100%; max-width: 360px; text-align: center; }
    .pw-icon { width: 70px; height: 70px; border-radius: 22px; background: linear-gradient(135deg, #7c3aed, #2563eb); display: flex; align-items: center; justify-content: center; font-size: 32px; color: #fff; margin: 0 auto 16px; box-shadow: 0 8px 28px rgba(124,58,237,0.35); }
    .pw-title { font-weight: 800; font-size: 24px; color: #0f172a; margin-bottom: 6px; }
    .pw-sub { font-size: 14px; color: #64748b; margin-bottom: 32px; }
    .pw-dots { display: flex; justify-content: center; gap: 14px; margin-bottom: 32px; }
    .pw-dot { width: 14px; height: 14px; border-radius: 50%; background: #e2e8f0; transition: background 0.15s; }
    .pw-dot.fill { background: #7c3aed; }
    .pw-keys { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .pw-key { height: 64px; border-radius: 16px; border: 1px solid #e8edf3; background: #fff; color: #0f172a; font-size: 22px; font-weight: 700; cursor: pointer; }
    .pw-key.del { background: #fff1f2; color: #dc2626; font-size: 20px; }
    .pw-btn { width: 100%; padding: 16px; border-radius: 16px; border: none; background: linear-gradient(135deg, #7c3aed, #2563eb); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; }
    .pw-btn:disabled { background: #e2e8f0; color: #94a3b8; cursor: default; }
    
    /* Main App */
    .main-app { min-height: 100vh; background: #f5f7fa; padding-bottom: 90px; }
    .header { background: #fff; border-bottom: 1px solid #e8edf3; position: sticky; top: 0; z-index: 40; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
    .header-inner { max-width: 600px; margin: 0 auto; padding: 0 16px; display: flex; justify-content: space-between; align-items: center; height: 56px; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-logo { width: 34px; height: 34px; border-radius: 10px; background: linear-gradient(135deg, #7c3aed, #2563eb); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 16px; }
    .header-text { font-weight: 800; font-size: 15px; line-height: 1; }
    .header-sub { font-size: 10px; color: #64748b; margin-top: 1px; }
    .header-buttons { display: flex; gap: 8px; }
    .header-btn { display: flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: 10px; border: 1px solid #e8edf3; background: #f8fafc; cursor: pointer; font-size: 17px; }
    
    .content { max-width: 600px; margin: 0 auto; padding: 16px; }
    .card { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 12px; }
    .card-title { font-weight: 700; font-size: 14px; margin-bottom: 10px; }
    .empty { text-align: center; padding: 60px 20px; color: #64748b; }
    .empty-icon { font-size: 56px; margin-bottom: 14px; }
    .empty-text { font-weight: 700; font-size: 17px; color: #0f172a; margin-bottom: 6px; }
    .empty-sub { font-size: 14px; }
    
    /* Bottom Nav */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #e8edf3; z-index: 40; box-shadow: 0 -2px 12px rgba(0,0,0,0.06); padding-bottom: env(safe-area-inset-bottom, 0px); }
    .nav-inner { max-width: 600px; margin: 0 auto; display: flex; }
    .nav-item { flex: 1; background: none; border: none; padding: 10px 0 8px; display: flex; flex-direction: column; align-items: center; gap: 3px; font-family: inherit; cursor: pointer; color: #64748b; border-top: 2px solid transparent; }
    .nav-item.active { color: #7c3aed; border-top-color: #7c3aed; }
    .nav-icon { font-size: 18px; line-height: 1; }
    .nav-label { font-size: 10px; font-weight: 500; }
    .nav-item.active .nav-label { font-weight: 700; }
    
    /* Form */
    .form { display: flex; flex-direction: column; gap: 16px; }
    .form-group { display: flex; flex-direction: column; }
    .form-label { font-size: 12px; color: #64748b; font-weight: 700; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-input, .form-select, .form-textarea { background: #f8fafc; border: 1.5px solid #e8edf3; border-radius: 12px; padding: 13px 14px; color: #0f172a; font-size: 16px; outline: none; font-family: inherit; box-sizing: border-box; width: 100%; }
    .form-textarea { resize: vertical; min-height: 72px; }
    .form-select { cursor: pointer; }
    
    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.5); backdrop-filter: blur(4px); display: flex; align-items: flex-end; z-index: 200; }
    .modal { background: #fff; border-radius: 22px 22px 0 0; width: 100%; padding: 0 0 40px; max-height: 95vh; overflow-y: auto; box-shadow: 0 -8px 40px rgba(0,0,0,0.15); }
    .modal-drag { display: flex; justify-content: center; padding-top: 12px; margin-bottom: 4px; }
    .modal-drag-handle { width: 40px; height: 4px; border-radius: 99px; background: #e2e8f0; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 20px 16px; }
    .modal-header h2 { margin: 0; font-weight: 800; font-size: 20px; }
    .modal-close { background: #f1f5f9; border: none; border-radius: 50%; width: 38px; height: 38px; color: #64748b; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .modal-content { padding: 0 20px; display: flex; flex-direction: column; gap: 16px; }
    .modal-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 24px 20px 0; }
    .modal-btn { border-radius: 14px; padding: 15px; font-family: inherit; font-weight: 700; font-size: 16px; cursor: pointer; border: none; }
    .modal-btn-cancel { background: #f1f5f9; border: 1px solid #e8edf3; color: #64748b; }
    .modal-btn-save { background: #7c3aed; color: #fff; box-shadow: 0 4px 14px rgba(124,58,237,0.35); }
    
    /* Toast */
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #16a34a; color: #fff; border-radius: 14px; padding: 13px 20px; font-weight: 600; font-size: 14px; box-shadow: 0 6px 24px rgba(0,0,0,0.2); z-index: 300; display: flex; align-items: center; gap: 10px; max-width: 88vw; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateX(-50%) translateY(20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
    
    /* FAB */
    .fab-container { position: fixed; bottom: 76px; right: 20px; z-index: 50; }
    .fab { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #7c3aed, #2563eb); border: none; color: #fff; font-size: 26px; cursor: pointer; box-shadow: 0 4px 20px rgba(99,66,237,0.45); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    
    /* Utils */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .text-center { text-align: center; }
    .mt-4 { margin-top: 16px; }
    .mb-4 { margin-bottom: 16px; }
  </style>
</head>
<body>
<div id="app"></div>

<script>
const SK = "finanzapp_v5";
const SK_PW = "finanzapp_pw_v5";

// Helpers
const fmt = v => new Intl.NumberFormat("de-DE", {style:"currency", currency:"EUR"}).format(v||0);
const fmtD = d => d ? new Date(d).toLocaleDateString("de-DE", {day:"2-digit", month:"2-digit", year:"numeric"}) : "–";

// State
let appState = {
  unlocked: false,
  tab: "home",
  data: {glaeubiger:[], kredite:[], versicherungen:[], privatSchulden:[], fixkosten:[], nextId: 1},
  modal: null,
  toast: null,
  editingItem: null,
};

// Load data
function loadData() {
  const saved = localStorage.getItem(SK);
  if (saved) {
    try {
      const d = JSON.parse(saved);
      if (!d.privatSchulden) d.privatSchulden = [];
      if (!d.fixkosten) d.fixkosten = [];
      appState.data = d;
    } catch(e) {}
  }
}

// Save data
function saveData() {
  localStorage.setItem(SK, JSON.stringify(appState.data));
  render();
}

// Show toast
function showToast(msg) {
  appState.toast = msg;
  render();
  setTimeout(() => {
    appState.toast = null;
    render();
  }, 3000);
}

// Render
function render() {
  const app = document.getElementById("app");
  
  if (!appState.unlocked) {
    app.innerHTML = renderPwScreen();
    attachPwListeners();
  } else {
    app.innerHTML = renderMainApp();
    attachMainListeners();
  }
}

function renderPwScreen() {
  const stored = localStorage.getItem(SK_PW);
  const isSetup = !stored;
  const pin = appState.pin || "";
  
  return `
    <div class="pw-screen">
      <div class="pw-box">
        <div class="pw-icon">🔐</div>
        <div class="pw-title">FinanzManager</div>
        <div class="pw-sub">${isSetup ? "PIN festlegen (4-6 Ziffern)" : "PIN eingeben"}</div>
        <div class="pw-dots">
          ${[0,1,2,3,4,5].map(i => `<div class="pw-dot ${i < pin.length ? 'fill' : ''}"></div>`).join("")}
        </div>
        <div class="pw-keys">
          ${[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map(k => `
            <button class="pw-key ${k === "⌫" ? "del" : k === "" ? "hidden" : ""}" data-key="${k}">${k}</button>
          `).join("")}
        </div>
        <button class="pw-btn" id="pw-submit" ${pin.length < 4 ? "disabled" : ""}>
          ${isSetup ? "Festlegen →" : "Entsperren →"}
        </button>
      </div>
    </div>
  `;
}

function renderMainApp() {
  return `
    <div class="main-app">
      <div class="header">
        <div class="header-inner">
          <div class="header-left">
            <div class="header-logo">F</div>
            <div>
              <div class="header-text">FinanzManager</div>
              <div class="header-sub">Gläubiger · Kredite · Versicherungen</div>
            </div>
          </div>
          <div class="header-buttons">
            <button class="header-btn" id="btn-backup" title="Backup">💾</button>
            <button class="header-btn" id="btn-lock" title="Sperren">🔒</button>
          </div>
        </div>
      </div>
      
      <div class="content">
        ${appState.tab === "home" ? renderHome() : ""}
        ${appState.tab === "gl" ? renderGlaeubiger() : ""}
      </div>
      
      <div class="bottom-nav">
        <div class="nav-inner">
          <button class="nav-item ${appState.tab === "home" ? "active" : ""}" data-tab="home">
            <span class="nav-icon">◉</span>
            <span class="nav-label">Übersicht</span>
          </button>
          <button class="nav-item ${appState.tab === "gl" ? "active" : ""}" data-tab="gl">
            <span class="nav-icon">👤</span>
            <span class="nav-label">Gläubiger</span>
          </button>
        </div>
      </div>
      
      ${appState.modal ? renderModal() : ""}
      ${appState.toast ? `<div class="toast">✓ ${appState.toast}</div>` : ""}
    </div>
  `;
}

function renderHome() {
  const totGL = appState.data.glaeubiger.reduce((s,g) => s + Math.max(0, (parseFloat(g.betrag)||0) - (parseFloat(g.gezahlt)||0)), 0);
  
  return `
    <div class="card">
      <div class="card-title">👤 Gläubiger offen</div>
      <div style="font-size: 24px; font-weight: 800; color: #7c3aed;">${fmt(totGL)}</div>
    </div>
    
    <div class="card">
      <div class="card-title">📋 Einträge</div>
      <div>Gläubiger: ${appState.data.glaeubiger.length}</div>
    </div>
  `;
}

function renderGlaeubiger() {
  if (appState.data.glaeubiger.length === 0) {
    return `
      <div class="empty">
        <div class="empty-icon">👤</div>
        <div class="empty-text">Noch keine Gläubiger</div>
        <div class="empty-sub">Tippe das + unten</div>
      </div>
    `;
  }
  
  return `
    <div>
      ${appState.data.glaeubiger.map(g => `
        <div class="card" style="border-left: 4px solid ${g.farbe || '#7c3aed'}">
          <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 10px;">
            <div>
              <div style="font-weight: 700; font-size: 16px;">${g.name}</div>
              <div style="font-size: 12px; color: #64748b; margin-top: 2px;">${g.typ}</div>
            </div>
            <div style="text-align: right;">
              <div style="font-weight: 800; font-size: 18px; color: #7c3aed;">${fmt(Math.max(0, (parseFloat(g.betrag)||0) - (parseFloat(g.gezahlt)||0)))}</div>
              <div style="font-size: 10px; color: #64748b;">offen</div>
            </div>
          </div>
          <button onclick="editItem('gl', ${g.id})" style="width: 100%; background: #f8fafc; border: 1px solid #e8edf3; border-radius: 10px; padding: 10px; color: #0f172a; cursor: pointer; font-weight: 600; margin-top: 8px;">
            ✏️ Bearbeiten
          </button>
        </div>
      `).join("")}
    </div>
  `;
}

function renderModal() {
  const m = appState.modal;
  if (m.kind === "gl") {
    const item = m.item || {typ:"Privatperson", farbe:"#7c3aed", ratenzahlung: true, erinnerung: true, erinnerungTage: "5"};
    return `
      <div class="modal-overlay">
        <div class="modal">
          <div class="modal-drag"><div class="modal-drag-handle"></div></div>
          <div class="modal-header">
            <h2>Gläubiger ${item.id ? "bearbeiten" : "hinzufügen"}</h2>
            <button class="modal-close" onclick="closeModal()">✕</button>
          </div>
          <div class="modal-content">
            <div class="form-group">
              <label class="form-label">Name *</label>
              <input type="text" class="form-input" id="gl-name" value="${item.name || ""}" placeholder="z.B. Max Mustermann">
            </div>
            <div class="grid-2">
              <div class="form-group">
                <label class="form-label">Typ</label>
                <select class="form-select" id="gl-typ">
                  <option ${item.typ === "Privatperson" ? "selected" : ""}>Privatperson</option>
                  <option ${item.typ === "Unternehmen" ? "selected" : ""}>Unternehmen</option>
                  <option ${item.typ === "Bank" ? "selected" : ""}>Bank</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Telefon</label>
                <input type="tel" class="form-input" id="gl-tel" value="${item.telefon || ""}" placeholder="+49 …">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">E-Mail</label>
              <input type="email" class="form-input" id="gl-email" value="${item.email || ""}" placeholder="name@mail.de">
            </div>
            <div class="grid-2">
              <div class="form-group">
                <label class="form-label">Betrag (€) *</label>
                <input type="number" class="form-input" id="gl-betrag" value="${item.betrag || ""}" placeholder="0.00">
              </div>
              <div class="form-group">
                <label class="form-label">Gezahlt (€)</label>
                <input type="number" class="form-input" id="gl-gezahlt" value="${item.gezahlt || 0}" placeholder="0.00">
              </div>
            </div>
          </div>
          <div class="modal-buttons">
            <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Abbrechen</button>
            <button class="modal-btn modal-btn-save" onclick="saveGlaeubiger(${item.id || 0})">Speichern</button>
          </div>
        </div>
      </div>
    `;
  }
  return "";
}

function closeModal() {
  appState.modal = null;
  render();
}

function saveGlaeubiger(id) {
  const name = document.getElementById("gl-name").value;
  if (!name) {
    alert("Name erforderlich!");
    return;
  }
  
  const item = {
    id: id || null,
    name,
    typ: document.getElementById("gl-typ").value,
    telefon: document.getElementById("gl-tel").value,
    email: document.getElementById("gl-email").value,
    betrag: parseFloat(document.getElementById("gl-betrag").value) || 0,
    gezahlt: parseFloat(document.getElementById("gl-gezahlt").value) || 0,
    farbe: "#7c3aed",
    ratenzahlung: true,
    erinnerung: true,
    erinnerungTage: "5",
    dateien: []
  };
  
  if (id) {
    appState.data.glaeubiger = appState.data.glaeubiger.map(g => g.id === id ? item : g);
  } else {
    item.id = appState.data.nextId++;
    appState.data.glaeubiger.push(item);
  }
  
  saveData();
  closeModal();
  showToast("Gespeichert ✓");
}

function editItem(kind, id) {
  if (kind === "gl") {
    const item = appState.data.glaeubiger.find(g => g.id === id);
    appState.modal = {kind: "gl", item};
    render();
  }
}

// Listeners
function attachPwListeners() {
  document.querySelectorAll(".pw-key").forEach(btn => {
    btn.addEventListener("click", () => {
      const k = btn.dataset.key;
      let pin = appState.pin || "";
      if (k === "⌫") {
        appState.pin = pin.slice(0, -1);
      } else if (pin.length < 6) {
        appState.pin = pin + k;
      }
      render();
    });
  });
  
  document.getElementById("pw-submit").addEventListener("click", () => {
    const pin = appState.pin || "";
    const stored = localStorage.getItem(SK_PW);
    const isSetup = !stored;
    
    if (isSetup) {
      if (pin.length < 4) return alert("Min. 4 Ziffern!");
      localStorage.setItem(SK_PW, btoa(pin));
      appState.pin = "";
      appState.unlocked = true;
      loadData();
      render();
    } else {
      if (btoa(pin) === stored) {
        appState.pin = "";
        appState.unlocked = true;
        loadData();
        render();
      } else {
        appState.pin = "";
        alert("Falscher PIN!");
        render();
      }
    }
  });
}

function attachMainListeners() {
  document.querySelectorAll(".nav-item").forEach(btn => {
    btn.addEventListener("click", () => {
      appState.tab = btn.dataset.tab;
      render();
    });
  });
  
  document.getElementById("btn-lock").addEventListener("click", () => {
    appState.unlocked = false;
    appState.pin = "";
    render();
  });
}

// Init
loadData();
render();
</script>
</body>
</html>
